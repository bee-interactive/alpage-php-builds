name: Build PHP Binaries

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:
    inputs:
      php_versions:
        description: 'PHP versions to build (comma-separated, e.g., 8.1,8.2,8.3,8.4,8.5)'
        required: false
        default: '8.1,8.2,8.3,8.4,8.5'

jobs:
  build:
    name: Build PHP ${{ matrix.php }} for macOS ARM64
    runs-on: macos-14
    strategy:
      fail-fast: false
      matrix:
        php: ['8.1', '8.2', '8.3', '8.4', '8.5']

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup PHP for running static-php-cli
        uses: shivammathur/setup-php@v2
        with:
          php-version: '8.4'
          tools: composer
          extensions: none
          coverage: none

      - name: Clone static-php-cli
        run: |
          git clone --depth=1 https://github.com/crazywhalecc/static-php-cli.git
          cd static-php-cli
          composer install --no-dev --optimize-autoloader

      - name: Run spc doctor
        run: cd static-php-cli && ./bin/spc doctor --auto-fix
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Download PHP sources
        run: |
          cd static-php-cli
          ./bin/spc download \
            --with-php=${{ matrix.php }} \
            --for-extensions=bcmath,bz2,calendar,ctype,curl,dom,exif,fileinfo,filter,ftp,gd,gmp,hash,iconv,intl,json,libxml,mbstring,mbregex,mysqlnd,mysqli,openssl,pcntl,pdo,pdo_mysql,pdo_pgsql,pdo_sqlite,pgsql,phar,posix,session,simplexml,soap,sockets,sodium,sqlite3,tokenizer,xml,xmlreader,xmlwriter,zip,zlib,redis \
            --for-libs=onig,libjpeg,libwebp \
            --retry=3
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Build PHP CLI and FPM
        run: |
          cd static-php-cli
          ./bin/spc build \
            bcmath,bz2,calendar,ctype,curl,dom,exif,fileinfo,filter,ftp,gd,gmp,hash,iconv,intl,json,libxml,mbstring,mbregex,mysqlnd,mysqli,openssl,pcntl,pdo,pdo_mysql,pdo_pgsql,pdo_sqlite,pgsql,phar,posix,session,simplexml,soap,sockets,sodium,sqlite3,tokenizer,xml,xmlreader,xmlwriter,zip,zlib,redis \
            --with-libs=onig,libjpeg,libwebp \
            --build-cli \
            --build-fpm \
            --build-embed

      - name: Check phpize availability
        id: check_phpize
        run: |
          PHPIZE=$(find "$(pwd)/static-php-cli/buildroot/bin" -name "phpize" -type f 2>/dev/null | head -1)
          PHP_CONFIG=$(find "$(pwd)/static-php-cli/buildroot/bin" -name "php-config" -type f 2>/dev/null | head -1)
          if [ -z "$PHPIZE" ] || [ ! -x "$PHPIZE" ] || [ -z "$PHP_CONFIG" ] || [ ! -x "$PHP_CONFIG" ]; then
            echo "phpize_available=false" >> $GITHUB_OUTPUT
            echo "⚠️  phpize not found - extension .so build not possible"
            ls -la static-php-cli/buildroot/bin/ || true
          else
            echo "phpize_available=true" >> $GITHUB_OUTPUT
            echo "phpize=$PHPIZE" >> $GITHUB_OUTPUT
            echo "php_config=$PHP_CONFIG" >> $GITHUB_OUTPUT
            echo "✅ phpize: $PHPIZE"
          fi

      - name: Install build dependencies
        if: steps.check_phpize.outputs.phpize_available == 'true'
        run: brew list autoconf >/dev/null 2>&1 || brew install autoconf

      - name: Build pcov with phpize
        if: steps.check_phpize.outputs.phpize_available == 'true'
        run: |
          PHPIZE="${{ steps.check_phpize.outputs.phpize }}"
          PHP_CONFIG="${{ steps.check_phpize.outputs.php_config }}"
          PCOV_VERSION="1.0.11"

          echo "Building pcov $PCOV_VERSION for PHP ${{ matrix.php }}"

          curl -fSL "https://github.com/krakjoe/pcov/archive/refs/tags/v${PCOV_VERSION}.tar.gz" -o pcov.tar.gz
          tar -xzf pcov.tar.gz
          cd "pcov-${PCOV_VERSION}"

          PHP_VER_NUM=$("$PHP_CONFIG" --version | awk -F. '{printf "%d%02d%02d", $1, $2, $3}')
          if [ "$PHP_VER_NUM" -ge 80200 ]; then
            sed -i '' 's/0, 0, 0, 0);/0, 0, 0);/' pcov.c
            echo "Applied pcov PHP 8.2+ compatibility patch (php_pcre_match_impl signature)"
          fi

          "$PHPIZE"
          ./configure --with-php-config="$PHP_CONFIG" --enable-pcov
          make -j$(sysctl -n hw.ncpu)

          PCOV_SO=$(find . -name "pcov.so" | head -1)
          if [ -n "$PCOV_SO" ]; then
            mkdir -p ../static-php-cli/buildroot/modules
            cp "$PCOV_SO" ../static-php-cli/buildroot/modules/pcov.so
            echo "✅ pcov.so built and installed"
          else
            echo "❌ pcov.so not found after build"
            exit 1
          fi

      - name: Test built binaries
        run: |
          ./static-php-cli/buildroot/bin/php -v
          ./static-php-cli/buildroot/bin/php -r "echo 'intl:      ' . (extension_loaded('intl')     ? '✅' : '❌') . PHP_EOL;"
          ./static-php-cli/buildroot/bin/php -r "echo 'redis:     ' . (extension_loaded('redis')    ? '✅' : '❌') . PHP_EOL;"
          ./static-php-cli/buildroot/bin/php -r "echo 'dl():      ' . (function_exists('dl')        ? '✅' : '❌') . PHP_EOL;"
          ls -la static-php-cli/buildroot/modules/ || echo "  (no modules)"

      - name: Package binaries
        run: |
          mkdir -p dist
          tar -czf dist/php-${{ matrix.php }}-cli-macos-aarch64.tar.gz -C static-php-cli/buildroot/bin php
          FPM_PATH=$(find static-php-cli/buildroot -name "php-fpm" -type f | head -1)
          tar -czf dist/php-${{ matrix.php }}-fpm-macos-aarch64.tar.gz -C "$(dirname $FPM_PATH)" php-fpm

          if [ -f static-php-cli/buildroot/modules/pcov.so ]; then
            tar -czf dist/php-${{ matrix.php }}-pcov-macos-aarch64.tar.gz -C static-php-cli/buildroot/modules pcov.so
            echo "✅ pcov.so packaged"
          else
            echo "⚠️  pcov.so not available - skipping"
          fi

          cd dist && shasum -a 256 *.tar.gz > SHA256SUMS && cat SHA256SUMS

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: php-${{ matrix.php }}-macos-aarch64
          path: dist/*
          retention-days: 7

  release:
    name: Create GitHub Release
    needs: build
    runs-on: ubuntu-latest
    if: startsWith(github.ref, 'refs/tags/')
    permissions:
      contents: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts

      - name: Prepare release assets
        run: |
          mkdir -p release
          find artifacts -name "*.tar.gz" -exec cp {} release/ \;
          find artifacts -name "SHA256SUMS" -exec cat {} \; > release/SHA256SUMS

      - name: Create Release
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          gh release create ${{ github.ref_name }} \
            release/* \
            --title "${{ github.ref_name }}" \
            --notes "# Alpage PHP Builds ${{ github.ref_name }}

          Custom PHP binaries for macOS ARM64 (Apple Silicon).

          ## Included in PHP binary (static)

          intl, redis, sodium, gd, gmp, curl, openssl, pdo, mbstring + 30 other extensions

          ## Optional extensions (.so)

          - \`pcov\` — Code coverage driver

          ## PHP Versions

          PHP 8.1 / 8.2 / 8.3 / 8.4 / 8.5"
